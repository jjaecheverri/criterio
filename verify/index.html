<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GROUND · Verifying Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0f; --bg2: #111118; --border: rgba(255,255,255,0.08); --text: #e8e6df; --text-dim: #9a9690; --text-muted: #5a5850; --re: #2D6BE4; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.95); }
.nav-brand { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: 0.05em; }
.nav-brand span { color: var(--text-dim); font-style: italic; }
.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 40px; }
.card { text-align: center; max-width: 400px; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--re); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
.card-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }
.card-title { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 8px; }
.card-text { color: var(--text-dim); font-size: 14px; }
.error-state { display: none; }
.error-icon { font-size: 40px; margin-bottom: 16px; }
footer { padding: 40px; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand">GROUND <span>by IN·KluSo</span></a>
</nav>
<div class="main">
  <div class="card" id="loadingState">
    <div class="spinner"></div>
    <div class="card-label">Email Verification</div>
    <h1 class="card-title">Verifying your account…</h1>
    <p class="card-text">Please wait while we confirm your email address.</p>
  </div>
  <div class="card error-state" id="errorState">
    <div class="error-icon">⚠️</div>
    <div class="card-label">Verification Error</div>
    <h1 class="card-title">No token found</h1>
    <p class="card-text">The verification link is invalid or missing. Please check your email or <a href="/signup/" style="color:var(--re);">sign up again</a>.</p>
  </div>
</div>
<footer>
  <p>GROUND by IN·KluSo &middot; <a href="https://in-kluso.com" style="color:var(--text-dim);">IN·KluSo</a> · <a href="/" style="color:var(--text-dim);">Home</a></p>
</footer>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (token) {
  window.location.href = '/api/auth/verify?token=' + encodeURIComponent(token);
} else {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}
</script>
</body>
</html>
