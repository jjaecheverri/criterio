<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GROUND · Contributor Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,0.08);
  --text: #e8e6df;
  --text-dim: #9a9690;
  --text-muted: #5a5850;
  --re: #2D6BE4;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); z-index: 100; }
.nav-brand { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: 0.05em; color: var(--text); }
.nav-brand span { color: var(--text-dim); font-style: italic; }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { font-size: 13px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.04em; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-validate { background: var(--text); color: var(--bg) !important; padding: 7px 16px; border-radius: 3px; font-weight: 600 !important; }
.nav-validate:hover { background: var(--text-dim) !important; }
.container { max-width: 440px; margin: 0 auto; padding: 60px 40px; }
@media (max-width: 640px) { .container { padding: 40px 20px; } .nav { padding: 16px 20px; } .nav-links { gap: 16px; } }
.page-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.page-title { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 5vw, 40px); margin-bottom: 8px; }
.page-sub { font-size: 15px; color: var(--text-dim); margin-bottom: 40px; }
.form-group { margin-bottom: 20px; position: relative; }
.form-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
.form-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; outline: none; }
.form-input:focus { border-color: rgba(45,107,228,0.5); }
.form-input::placeholder { color: var(--text-muted); }
.password-wrapper { position: relative; }
.password-wrapper .form-input { padding-right: 48px; }
.toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 4px; }
.toggle-pw:hover { color: var(--text); }
.btn-primary { width: 100%; background: var(--re); color: white; border: none; border-radius: 4px; padding: 14px 24px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.form-footer { margin-top: 24px; text-align: center; color: var(--text-dim); font-size: 14px; line-height: 1.8; }
.form-footer a { color: var(--re); }
.alert { padding: 12px 16px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; display: none; }
.alert-error { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #f08080; }
.alert-warning { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: #d4ac50; }
footer { padding: 40px; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 60px; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand">GROUND <span>by IN·KluSo</span></a>
  <div class="nav-links"><a href="/real-estate/">Real Estate</a><a href="/retail/">Retail</a><a href="/brand/">Brand</a><a href="/about/">About</a><a href="/register/" class="nav-validate">Validate →</a></div>
</nav>
<div class="container">
  <div class="page-label">Contributor Access</div>
  <h1 class="page-title">Contributor Login</h1>
  <p class="page-sub">Access your GROUND contributor account.</p>

  <div class="alert alert-error" id="errorMsg"></div>
  <div class="alert alert-warning" id="warningMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input class="form-input" type="email" id="email" name="email" placeholder="you@yourcompany.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="password-wrapper">
        <input class="form-input" type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">Show</button>
      </div>
    </div>
    <button class="btn-primary" type="submit" id="submitBtn">Login</button>
  </form>

  <div class="form-footer">
    <div>New contributor? <a href="/signup/">Sign up →</a></div>
  </div>
</div>
<footer>
  <p>GROUND by IN·KluSo &middot; <a href="https://in-kluso.com" style="color:var(--text-dim);">IN·KluSo</a> · <a href="/" style="color:var(--text-dim);">Home</a></p>
</footer>
<script>
const errorMsg = document.getElementById('errorMsg');
const warningMsg = document.getElementById('warningMsg');
const submitBtn = document.getElementById('submitBtn');
const togglePw = document.getElementById('togglePw');
const passwordInput = document.getElementById('password');

// Handle URL error params
const params = new URLSearchParams(window.location.search);
const errParam = params.get('error');
if (errParam === 'invalid_token') {
  warningMsg.textContent = 'Invalid or expired verification link. Please try logging in or sign up again.';
  warningMsg.style.display = 'block';
} else if (errParam === 'expired_token') {
  warningMsg.textContent = 'Verification link expired. Please sign up again to get a new link.';
  warningMsg.style.display = 'block';
} else if (errParam === 'user_not_found') {
  errorMsg.textContent = 'Account not found. Please sign up.';
  errorMsg.style.display = 'block';
}

// Toggle password visibility
togglePw.addEventListener('click', () => {
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    togglePw.textContent = 'Hide';
  } else {
    passwordInput.type = 'password';
    togglePw.textContent = 'Show';
  }
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  warningMsg.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Logging in…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: passwordInput.value
      })
    });
    const data = await res.json();
    if (data.success) {
      const redirect = params.get('redirect') || '/dashboard/';
      window.location.href = redirect;
    } else {
      errorMsg.textContent = data.error || 'Login failed.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Login';
    }
  } catch (err) {
    errorMsg.textContent = 'Network error. Please try again.';
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Login';
  }
});
</script>
</body>
</html>
