:root {

  --re: #2D6BE4;
  --green: #2E9B6F;
  --orange: #E8602C;
  --gold: #C9A84C;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); z-index: 100; }
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-brand-text { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: 0.05em; color: var(--text); }

.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { font-size: 13px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.04em; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.container { max-width: 860px; margin: 0 auto; padding: 60px 40px; }

.page-title { font-family: 'DM Serif Display', serif; font-size: clamp(28px, 5vw, 44px); margin-bottom: 32px; }
.profile-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 28px; margin-bottom: 40px; display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.profile-left { flex: 1; }
.profile-name { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 6px; }
.profile-meta { color: var(--text-dim); font-size: 14px; line-height: 1.7; }
.profile-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(45,107,228,0.12); border: 1px solid rgba(45,107,228,0.3); border-radius: 4px; padding: 4px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: #7aaaf0; letter-spacing: 0.05em; margin-top: 12px; display: inline-block; }
.btn-logout { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 4px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-logout:hover { border-color: rgba(220,50,50,0.4); color: #f08080; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
.tab-btn { background: none; border: none; padding: 10px 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
.tab-btn:hover { color: var(--text-dim); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--re); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.quick-validate-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 28px; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; appearance: none; cursor: pointer; }
.form-select:focus { outline: none; border-color: rgba(45,107,228,0.5); }
.article-search { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; margin-bottom: 8px; }
.article-search:focus { outline: none; border-color: rgba(45,107,228,0.5); }
.article-search::placeholder { color: var(--text-muted); }

.article-option { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); line-height: 1.4; }
.article-option:last-child { border-bottom: none; }
.article-option:hover { background: rgba(45,107,228,0.1); }
.article-option .opt-vertical { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }
.selected-article { background: rgba(45,107,228,0.1); border: 1px solid rgba(45,107,228,0.3); border-radius: 4px; padding: 10px 14px; font-size: 13px; display: none; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.selected-article span { color: var(--text-dim); flex: 1; }
.clear-selection { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; }
.clear-selection:hover { color: var(--text); }
.form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 14px; font-size: 14px; font-family: 'Lora', serif; resize: vertical; min-height: 120px; line-height: 1.6; }
.form-textarea:focus { outline: none; border-color: rgba(45,107,228,0.5); }

.form-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

.profile-preview-item { font-size: 13px; }

    <!-- PEER REVIEW TAB -->
    <div id="tab-peer-review" class="tab-panel">
      <div style="padding:0 0 24px;">
        <div class="section-heading">Peer Review Browser</div>
        <p style="font-size:13px;color:#8A8578;margin-bottom:20px;line-height:1.6;">Browse articles by assessment state. Filter by vertical to find signals that need your expert review.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;" id="pr-filters">
          <button class="pr-filter active" data-filter="all">All</button>
          <button class="pr-filter" data-filter="UNREVIEWED" style="color:#8A8578;border-color:#8A857833;">Awaiting Validation</button>
          <button class="pr-filter" data-filter="VALIDATED" style="color:#2D6BE4;border-color:#2D6BE433;">Validated</button>
          <button class="pr-filter" data-filter="PEER_REVIEWED" style="color:#2E9B6F;border-color:#2E9B6F33;">Peer Reviewed</button>
          <button class="pr-filter" data-filter="CONTESTED" style="color:#E8602C;border-color:#E8602C33;">Under Review</button>
          <button class="pr-filter" data-filter="GOLD_STANDARD" style="color:#C9A84C;border-color:#C9A84C33;">Gold Standard</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;" id="pr-vertical-filters">
          <button class="pr-vfilter active" data-vertical="all">All Verticals</button>
          <button class="pr-vfilter" data-vertical="real-estate" style="color:#2D6BE4;">Real Estate</button>
          <button class="pr-vfilter" data-vertical="brand" style="color:#E8602C;">Brand</button>
          <button class="pr-vfilter" data-vertical="retail" style="color:#C4317A;">Retail</button>
          <button class="pr-vfilter" data-vertical="food-agriculture" style="color:#2E9B6F;">Food & Ag</button>
          <button class="pr-vfilter" data-vertical="family-education" style="color:#C9A84C;">Family & Ed</button>
        </div>
        <div id="pr-article-list" style="display:grid;gap:8px;"></div>
        <div id="pr-loading" style="text-align:center;padding:40px;color:#8A8578;font-size:13px;">Loading articles…</div>
      </div>
    </div>
  `;

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/';
  });

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Article search
  const searchInput = document.getElementById('articleSearch');
  const optionsEl = document.getElementById('articleOptions');
  const selectedDisplay = document.getElementById('selectedArticleDisplay');
  const selectedTitle = document.getElementById('selectedArticleTitle');
  const selectedSlug = document.getElementById('selectedArticleSlug');
  const clearBtn = document.getElementById('clearSelection');

  function renderOptions(query) {
    const q = query.toLowerCase();
    const matches = ARTICLES.filter(a =>
      a.title.toLowerCase().includes(q) || a.slug.toLowerCase().includes(q) || a.vertical.toLowerCase().includes(q)
    ).slice(0, 12);
    if (matches.length === 0) {
      optionsEl.innerHTML = '<div class="article-option" style="color:var(--text-muted)">No articles found</div>';
    } else {
      optionsEl.innerHTML = matches.map(a =>
        `<div class="article-option" data-slug="${a.slug}" data-title="${a.title.replace(/"/g, '&quot;')}">
          <span class="opt-vertical">${a.vertical.replace(/-/g,' ').toUpperCase()}</span>
          ${a.title}
        </div>`
      ).join('');
      optionsEl.querySelectorAll('.article-option[data-slug]').forEach(opt => {
        opt.addEventListener('click', () => {
          selectedSlug.value = opt.dataset.slug;
          selectedTitle.textContent = opt.dataset.title;
          selectedDisplay.style.display = 'flex';
          searchInput.style.display = 'none';
          optionsEl.style.display = 'none';
          // Set view link: convert double-dash slug to path
          const articlePath = '/' + opt.dataset.slug.replace('--', '/') + '/';
          const viewLink = document.getElementById('viewArticleLink');
          if (viewLink) viewLink.href = articlePath;
        });
      });
    }
    optionsEl.style.display = 'block';
  }

  searchInput.addEventListener('input', () => {
    if (searchInput.value.length > 0) renderOptions(searchInput.value);
    else optionsEl.style.display = 'none';
  });

  searchInput.addEventListener('focus', () => {
    if (searchInput.value.length > 0) renderOptions(searchInput.value);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#articleSearch') && !e.target.closest('#articleOptions')) {
      optionsEl.style.display = 'none';
    }
  });

  clearBtn.addEventListener('click', () => {
    selectedSlug.value = '';
    selectedTitle.textContent = '';
    selectedDisplay.style.display = 'none';
    searchInput.style.display = 'block';
    searchInput.value = '';
    searchInput.focus();
  });

  // ── Quick Validate: dimension score state ────────────────────────────────
  let quickScores = { factual: 0, source: 0, rigor: 0, relevance: 0, utility: 0 };
  let quickAnnotationType = 'Corroborate';

  // Annotation pill toggle
  document.getElementById('quickAnnotTypes').addEventListener('click', e => {
    const pill = e.target.closest('.annot-pill');
    if (!pill) return;
    document.querySelectorAll('.annot-pill').forEach(p => {
      const type = p.dataset.type;
      const colors = { Corroborate: '#22c55e', Challenge: '#f97316', Extend: '#3b82f6', Clarify: '#eab308' };
      p.style.background = 'transparent';
      p.style.color = colors[type];
    });
    quickAnnotationType = pill.dataset.type;
    const colors = { Corroborate: '#22c55e', Challenge: '#f97316', Extend: '#3b82f6', Clarify: '#eab308' };
    pill.style.background = colors[quickAnnotationType];
    pill.style.color = '#fff';
  });

  // Wire dimension sliders once they're in the DOM (they're template-rendered)
  // Use event delegation since sliders are injected via innerHTML
  document.addEventListener('input', e => {
    if (e.target.classList.contains('quick-dim-slider')) {
      const dim = e.target.dataset.dim;
      const val = parseInt(e.target.value, 10);
      if (dim && quickScores.hasOwnProperty(dim)) {
        quickScores[dim] = val;
        // Update displayed score label
        const label = document.getElementById('qdv-' + dim);
        if (label) label.textContent = val === 0 ? '—' : val;
      }
    }
  });

  // Quick validate submit
  document.getElementById('quickSubmitBtn').addEventListener('click', async () => {
    const rawSlug = selectedSlug.value;
    // Normalize slug: always use -- separator so it matches review-mode.js KV keys
    const slug = rawSlug.replace(/\//g, '--');
    const commentary = document.getElementById('quickCommentary').value.trim();
    const successEl = document.getElementById('validateSuccess');
    const errorEl = document.getElementById('validateError');
    const btn = document.getElementById('quickSubmitBtn');
    successEl.style.display = 'none';
    errorEl.style.display = 'none';
    if (!slug) { errorEl.textContent = 'Please select an article first.'; errorEl.style.display = 'block'; return; }
    if (commentary.length < 20) { errorEl.textContent = 'Please share at least a sentence of commentary.'; errorEl.style.display = 'block'; return; }
    btn.disabled = true;
    btn.textContent = 'Submitting...';
    try {
      const res = await fetch('/api/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          article: slug,
          name: user.name,
          title: user.title,
          org: user.org,
          yearsExp: user.yearsExp,
          commentary,
          scores: quickScores,
          annotationType: quickAnnotationType,
          fromDashboard: true
        })
      });
      const data = await res.json();
      if (res.ok) {
        // Use raw slug for display URL (with slashes)
        const displaySlug = rawSlug;
        successEl.innerHTML = `✓ Validation submitted! <a href="/${displaySlug}/" style="color:var(--green);text-decoration:underline;">View it live →</a>`;
        successEl.style.display = 'block';
        document.getElementById('quickCommentary').value = '';
        clearBtn.click();
        // Reset dimension scores
        quickScores = { factual: 0, source: 0, rigor: 0, relevance: 0, utility: 0 };
        quickAnnotationType = 'Corroborate';
        document.querySelectorAll('.annot-pill').forEach(p => {
          const type = p.dataset.type; const colors = { Corroborate: '#22c55e', Challenge: '#f97316', Extend: '#3b82f6', Clarify: '#eab308' };
          p.style.background = type === 'Corroborate' ? colors[type] : 'transparent';
          p.style.color = type === 'Corroborate' ? '#fff' : colors[type];
        });
        document.querySelectorAll('.quick-dim-slider').forEach(s => { s.value = 0; });
        document.querySelectorAll('.quick-dim-val').forEach(v => { v.textContent = '0'; });
        btn.disabled = false;
        btn.textContent = 'Submit Another →';
      } else {
        const errMsg = data.error === 'quality_gate'
          ? (data.feedback || data.message || 'Your validation needs a specific local insight. Include a data point, named market example, or direct professional experience reference.')
          : (data.error || 'Submission failed. Please try again.');
        errorEl.textContent = errMsg;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Submit Validation →';
      }
    } catch(e) {
      errorEl.textContent = 'Network error: ' + (e.message || 'Please try again.');
      errorEl.style.display = 'block';
      btn.textContent = 'Submit Validation →';
    }
    btn.disabled = false;
  });

  // Recommend submit
  document.getElementById('recommendForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const successEl = document.getElementById('recommendSuccess');
    successEl.style.display = 'none';
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const res = await fetch('/api/auth/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('recName').value.trim(),
          email: document.getElementById('recEmail').value.trim(),
          titleOrg: document.getElementById('recTitle').value.trim(),
          note: document.getElementById('recNote').value.trim(),
          fromName: user.name
        })
      });
      if (res.ok) {
        successEl.style.display = 'block';
        document.getElementById('recName').value = '';
        document.getElementById('recEmail').value = '';
        document.getElementById('recTitle').value = '';
        document.getElementById('recNote').value = '';
      }
    } catch(e) {}
    btn.disabled = false;
    btn.textContent = 'Send Invite →';
  });

  // ── Peer Review Tab ──────────────────────────────────────────────────
  const PR_ARTICLES = [
    // Real Estate (19)
    {slug:'real-estate--airbnb-effect-housing-rental-markets',title:'The Airbnb Effect on Housing & Rental Markets',vertical:'real-estate'},
    {slug:'real-estate--climate-migration-housing-demand-shift',title:'Climate Migration & Housing Demand Shifts',vertical:'real-estate'},
    {slug:'real-estate--housing-affordability-index-historical-context',title:'Housing Affordability Index: Historical Context',vertical:'real-estate'},
    {slug:'real-estate--housing-underbuilding-deficit-4-million-units',title:'The 4 Million Unit Housing Underbuilding Deficit',vertical:'real-estate'},
    {slug:'real-estate--institutional-single-family-rental-market-impact',title:'Institutional Single-Family Rental Market Impact',vertical:'real-estate'},
    {slug:'real-estate--insurance-cost-escalation-sunbelt-real-estate',title:'Insurance Cost Escalation in Sunbelt Real Estate',vertical:'real-estate'},
    {slug:'real-estate--mortgage-lock-in-effect-market-analysis',title:'The Mortgage Lock-In Effect: Market Analysis',vertical:'real-estate'},
    {slug:'real-estate--new-home-sales-builder-incentives-2026',title:'New Home Sales & Builder Incentives 2026',vertical:'real-estate'},
    {slug:'real-estate--northeast-midwest-housing-market-shift',title:'Northeast/Midwest Housing Market Shift',vertical:'real-estate'},
    {slug:'real-estate--nwa-commercial-vacancy-national-divergence',title:'NWA Commercial Vacancy vs National Divergence',vertical:'real-estate'},
    {slug:'real-estate--nwa-employer-concentration-real-estate-risk',title:'NWA Employer Concentration Real Estate Risk',vertical:'real-estate'},
    {slug:'real-estate--nwa-home-price-divergence-county-analysis',title:'NWA Home Price Divergence: County Analysis',vertical:'real-estate'},
    {slug:'real-estate--nwa-infrastructure-caps-development-2026',title:'NWA Infrastructure Caps Development 2026',vertical:'real-estate'},
    {slug:'real-estate--nwa-multifamily-vacancy-supply-correction',title:'NWA Multifamily Vacancy & Supply Correction',vertical:'real-estate'},
    {slug:'real-estate--nwa-residential-pricing-precision-market',title:'NWA Residential Pricing Precision Market',vertical:'real-estate'},
    {slug:'real-estate--proptech-valuation-correction-market-reality',title:'Proptech Valuation Correction: Market Reality',vertical:'real-estate'},
    {slug:'real-estate--real-estate-agent-commission-settlement-impact',title:'Agent Commission Settlement Impact',vertical:'real-estate'},
    {slug:'real-estate--remote-work-office-conversion-feasibility',title:'Remote Work & Office Conversion Feasibility',vertical:'real-estate'},
    {slug:'real-estate--zoning-reform-housing-supply-impact',title:'Zoning Reform & Housing Supply Impact',vertical:'real-estate'},
    // Brand (20)
    {slug:'brand--ai-generated-content-brand-trust-erosion',title:'AI-Generated Content & Brand Trust Erosion',vertical:'brand'},
    {slug:'brand--brand-distinctiveness-erosion-market-analysis',title:'Brand Distinctiveness Erosion: Market Analysis',vertical:'brand'},

    {slug:'brand--brand-voice-as-competitive-asset',title:'Brand Voice as a Competitive Asset',vertical:'brand'},
    {slug:'brand--creative-brief-quality-campaign-performance',title:'Creative Brief Quality & Campaign Performance',vertical:'brand'},
    {slug:'brand--creator-economy-middle-class-myth',title:'The Creator Economy Middle Class Myth',vertical:'brand'},
    {slug:'brand--destination-branding-search-disintermediation',title:'Destination Branding & Search Disintermediation',vertical:'brand'},
    {slug:'brand--employer-brand-talent-acquisition-cost',title:'Employer Brand & Talent Acquisition Cost',vertical:'brand'},
    {slug:'brand--experiential-hospitality-hotel-differentiation',title:'Experiential Hospitality & Hotel Differentiation',vertical:'brand'},
    {slug:'brand--hotel-resort-fee-transparency-consumer-backlash',title:'Resort Fee Transparency & Consumer Backlash',vertical:'brand'},
    {slug:'brand--influencer-marketing-fraud-rate-measurement',title:'Influencer Marketing Fraud Rate Measurement',vertical:'brand'},
    {slug:'brand--loyalty-program-devaluation-consumer-impact',title:'Loyalty Program Devaluation: Consumer Impact',vertical:'brand'},
    {slug:'brand--luxury-hospitality-bifurcation-market-analysis',title:'Luxury Hospitality Bifurcation: Market Analysis',vertical:'brand'},
    {slug:'brand--overtourism-destination-management-economics',title:'Overtourism & Destination Management Economics',vertical:'brand'},
    {slug:'brand--podcast-advertising-measurement-attribution',title:'Podcast Advertising Measurement & Attribution',vertical:'brand'},
    {slug:'brand--rebranding-failure-rate-research-analysis',title:'Rebranding Failure Rate: Research Analysis',vertical:'brand'},
    {slug:'brand--sports-sponsorship-roi-measurement-gap',title:'Sports Sponsorship ROI Measurement Gap',vertical:'brand'},
    {slug:'brand--subscription-fatigue-consumer-spending-limits',title:'Subscription Fatigue & Consumer Spending Limits',vertical:'brand'},
    {slug:'brand--travel-advisor-resurgence-complexity-premium',title:'Travel Advisor Resurgence & Complexity Premium',vertical:'brand'},
    {slug:'brand--travel-industry-trust-gap-reviews-authenticity',title:'Travel Industry Trust Gap & Reviews Authenticity',vertical:'brand'},
    // Retail (sample)
    {slug:'retail--retail-media-60b-vendor-margin-risk',title:'$60B Retail Media: Vendor Margin Risk',vertical:'retail'},
    {slug:'retail--private-label-growth-brand-margin-pressure',title:'Private Label Growth & Brand Margin Pressure',vertical:'retail'},
    {slug:'retail--grocery-inflation-consumer-behavior-shift',title:'Grocery Inflation & Consumer Behavior Shift',vertical:'retail'},
    {slug:'retail--self-checkout-retreat-retail-labor-calculus',title:'Self-Checkout Retreat: The Labor Calculus',vertical:'retail'},
    {slug:'retail--costco-membership-model-retail-anomaly',title:'Costco Membership Model: Retail Anomaly',vertical:'retail'},
    // Food & Ag (8)
    {slug:'food-agriculture--farm-labor-shortage-mechanization-gap',title:'Farm Labor Shortage & Mechanization Gap',vertical:'food-agriculture'},
    {slug:'food-agriculture--farmers-market-economics-premium-myth',title:'Farmers Market Economics: The Premium Myth',vertical:'food-agriculture'},
    {slug:'food-agriculture--food-waste-supply-chain-130-billion',title:'Food Waste in the Supply Chain: $130B Problem',vertical:'food-agriculture'},
    {slug:'food-agriculture--grocery-shrinkflation-consumer-price-perception',title:'Grocery Shrinkflation & Consumer Price Perception',vertical:'food-agriculture'},
    {slug:'food-agriculture--grocery-store-profit-margin-1-2-percent',title:'Grocery Store Profit Margin: The 1-2% Reality',vertical:'food-agriculture'},
    {slug:'food-agriculture--organic-label-premium-consumer-confusion',title:'Organic Label Premium & Consumer Confusion',vertical:'food-agriculture'},
    {slug:'food-agriculture--restaurant-food-cost-margin-analysis',title:'Restaurant Food Cost & Margin Analysis',vertical:'food-agriculture'},
    {slug:'food-agriculture--ultra-processed-food-80-percent-grocery',title:'Ultra-Processed Foods: 80% of the Grocery',vertical:'food-agriculture'},
    // Family & Education (8)
    {slug:'family-education--childcare-cost-crisis-economic-analysis',title:'Childcare Cost Crisis: Economic Analysis',vertical:'family-education'},
    {slug:'family-education--college-degree-roi-varies-500-percent',title:'College Degree ROI Varies 500%',vertical:'family-education'},
    {slug:'family-education--homeschool-growth-2-million-students',title:'Homeschool Growth: 2 Million Students',vertical:'family-education'},
    {slug:'family-education--screen-time-parenting-industry-fear-economy',title:'Screen Time & the Parenting Fear Economy',vertical:'family-education'},
    {slug:'family-education--student-loan-payment-consumer-spending-drag',title:'Student Loan Payments: Consumer Spending Drag',vertical:'family-education'},
    {slug:'family-education--summer-learning-loss-achievement-gap-economics',title:'Summer Learning Loss & Achievement Gap Economics',vertical:'family-education'},
    {slug:'family-education--tutoring-industry-learning-loss-economics',title:'Tutoring Industry & Learning Loss Economics',vertical:'family-education'},
    {slug:'family-education--youth-sports-spending-30-billion-industry',title:'Youth Sports: The $30B Industry',vertical:'family-education'},
  ];

  const STATE_COLORS = {
    UNREVIEWED: '#8A8578', VALIDATED: '#2D6BE4', PEER_REVIEWED: '#2E9B6F',
    CONTESTED: '#E8602C', GOLD_STANDARD: '#C9A84C'
  };
  const STATE_LABELS = {
    UNREVIEWED: 'Awaiting', VALIDATED: 'Validated', PEER_REVIEWED: 'Peer Reviewed',
    CONTESTED: 'Under Review', GOLD_STANDARD: 'Gold Standard'
  };

  let prData = {};
  let prFilter = 'all';
  let prVertical = 'all';

  async function loadPRData() {
    // Load assessment states for a sample of articles in parallel
    const promises = PR_ARTICLES.slice(0, 30).map(async (a) => {
      try {
        const res = await fetch(`/api/validations?slug=${a.slug}`);
        const data = await res.json();
        prData[a.slug] = data.assessmentState || 'UNREVIEWED';
      } catch(e) { prData[a.slug] = 'UNREVIEWED'; }
    });
    await Promise.all(promises);
    renderPRList();
  }

  function renderPRList() {
    const list = document.getElementById('pr-article-list');
    const loading = document.getElementById('pr-loading');
    if (!list) return;
    if (loading) loading.style.display = 'none';

    let articles = PR_ARTICLES;
    if (prVertical !== 'all') articles = articles.filter(a => a.vertical === prVertical);
    if (prFilter !== 'all') articles = articles.filter(a => (prData[a.slug] || 'UNREVIEWED') === prFilter);

    if (articles.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:40px;color:#8A8578;font-size:13px;">No articles match this filter.</div>';
      return;
    }

    list.innerHTML = articles.map(a => {
      const state = prData[a.slug] || 'UNREVIEWED';
      const color = STATE_COLORS[state] || '#8A8578';
      const label = STATE_LABELS[state] || state;
      const urlSlug = a.slug.replace('--', '/');
      return `<div class="pr-article-row">
        <div style="flex:1;min-width:0;">
          <div class="pr-article-title">${a.title}</div>
          <div class="pr-article-meta">${a.vertical.replace('-', ' & ').replace('-', ' ').toUpperCase()}</div>
        </div>
        <div class="pr-state-badge" style="color:${color};border-color:${color}44;">${label}</div>
        <a href="/${urlSlug}/" class="pr-review-link">Review →</a>
      </div>`;
    }).join('');
  }

  // PR filter buttons
  document.getElementById('pr-filters')?.addEventListener('click', e => {
    const btn = e.target.closest('.pr-filter');
    if (!btn) return;
    document.querySelectorAll('.pr-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    prFilter = btn.dataset.filter;
    renderPRList();
  });

  document.getElementById('pr-vertical-filters')?.addEventListener('click', e => {
    const btn = e.target.closest('.pr-vfilter');
    if (!btn) return;
    document.querySelectorAll('.pr-vfilter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    prVertical = btn.dataset.vertical;
    renderPRList();
  });

  // Load PR data when tab is clicked
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tab === 'peer-review' && Object.keys(prData).length === 0) {
        loadPRData();
      }
    });
  });

})();

function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
